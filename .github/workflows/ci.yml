name: contracts-ci

on:
  push:
    branches: [main, integration]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint OpenAPI
        run: npm run lint

      - name: Generate types
        run: npm run generate

      - name: Check generated types are committed
        run: git diff --exit-code -- src/pawit-api.ts

      - name: Typecheck
        run: npm run typecheck
