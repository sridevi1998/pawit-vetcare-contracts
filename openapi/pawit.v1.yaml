openapi: 3.1.0
info:
  title: PawIt VetCare API
  version: 0.3.0
  license:
    name: Proprietary
    url: https://pawit.care/legal/terms
  summary: Contract for the PawIt VetCare multi-tenant veterinary HMS API.
  description: >
    PawIt VetCare is a serverless, multi-tenant veterinary hospital management
    platform. This contract is the source of truth for backend implementation,
    frontend API clients, and contract tests.
servers:
  - url: https://api.pawit.care
    description: Production API
  - url: https://api.dev.pawit.care
    description: Development API
security:
  - cookieAuth: []
  - bearerAuth: []
tags:
  - name: System
    description: Health, readiness, and platform-level endpoints.
  - name: Current User
    description: Authenticated user, tenant, and clinic context.
  - name: Product Policy
    description: PawIt product settings, role policies, and supported workflows.
  - name: Dashboard
    description: Hospital portal navigation and operational summary data.
  - name: Appointments
    description: Appointment scheduling, cancellation, calendar, and visit status.
  - name: Queue
    description: Walk-in registration and patient queue state transitions.
  - name: Pets
    description: Dog and cat records, guardians, and document metadata.
  - name: Clinical
    description: Prescriptions, SOAP notes, lab orders, and diagnostic reports.
  - name: Billing
    description: Billing dashboards, invoices, and invoice voiding.
  - name: Analytics
    description: Tenant analytics, feedback, ratings, and reporting data.
  - name: Staff
    description: Veterinarian and clinic staff management.
  - name: Admin
    description: Tenant administrative controls, audit review, and governance.
paths:
  /healthz:
    get:
      operationId: getHealth
      tags: [System]
      summary: Public liveness check
      security: []
      responses:
        "200":
          description: Service is alive
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /readyz:
    get:
      operationId: getReadiness
      tags: [System]
      summary: Public readiness check
      security: []
      responses:
        "200":
          description: Service dependencies are ready
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/me:
    get:
      operationId: getCurrentUser
      tags: [Current User]
      summary: Get current user and tenant context
      responses:
        "200":
          description: Current user context
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/product-spec:
    get:
      operationId: getProductSpec
      tags: [Product Policy]
      summary: Get approved PawIt v1 product policy
      responses:
        "200":
          description: Product policy
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSpec"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/role-policies:
    get:
      operationId: listRolePolicies
      tags: [Product Policy]
      summary: List PawIt role and permission policies
      responses:
        "200":
          description: Role policies
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePolicyList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/navigation:
    get:
      operationId: getNavigation
      tags: [Dashboard]
      summary: Get hospital portal navigation sections
      responses:
        "200":
          description: Navigation sections
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavigationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [Dashboard]
      summary: Get top-level operational metrics
      responses:
        "200":
          description: Dashboard metrics
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/appointments:
    get:
      operationId: listAppointments
      tags: [Appointments]
      summary: List appointments
      responses:
        "200":
          description: Appointment list
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createAppointment
      tags: [Appointments]
      summary: Create a staff-managed appointment or pet-parent appointment request
      description: >
        Pet parents create requested appointments. Staff users with appointment
        management permission can create scheduled appointments. Telemedicine
        appointments use manually entered meeting links in v1.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Appointment created
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/appointments/{id}/cancel:
    post:
      operationId: cancelAppointment
      tags: [Appointments]
      summary: Cancel an appointment with clinic cutoff enforcement
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelAppointmentRequest"
      responses:
        "200":
          description: Appointment cancelled
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/calendar:
    get:
      operationId: getCalendar
      tags: [Appointments]
      summary: Get appointment calendar data
      responses:
        "200":
          description: Calendar data
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/queue:
    get:
      operationId: listQueueEntries
      tags: [Queue]
      summary: List active queue entries
      responses:
        "200":
          description: Queue entries
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueEntryList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/queue/walk-ins:
    post:
      operationId: registerWalkIn
      tags: [Queue]
      summary: Register a walk-in queue entry and linked appointment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterWalkInRequest"
      responses:
        "201":
          description: Walk-in registered
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/queue/{id}/call:
    post:
      operationId: callQueueEntry
      tags: [Queue]
      summary: Mark a queue entry as called
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/UpdateQueueBody"
      responses:
        "200":
          $ref: "#/components/responses/QueueMutationOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/queue/{id}/start:
    post:
      operationId: startQueueEntry
      tags: [Queue]
      summary: Move a queue entry into consultation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/UpdateQueueBody"
      responses:
        "200":
          $ref: "#/components/responses/QueueMutationOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/queue/{id}/complete:
    post:
      operationId: completeQueueEntry
      tags: [Queue]
      summary: Complete a queue entry and linked appointment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/UpdateQueueBody"
      responses:
        "200":
          $ref: "#/components/responses/QueueMutationOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/queue/{id}/cancel:
    post:
      operationId: cancelQueueEntry
      tags: [Queue]
      summary: Cancel a queue entry and linked appointment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/UpdateQueueBody"
      responses:
        "200":
          $ref: "#/components/responses/QueueMutationOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/pets:
    get:
      operationId: listPets
      tags: [Pets]
      summary: List dog/cat pet records
      responses:
        "200":
          description: Pet records
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetRecordList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createPet
      tags: [Pets]
      summary: Create a dog/cat pet record with first guardian
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
      responses:
        "201":
          description: Pet created
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/pets/{id}/archive:
    post:
      operationId: archivePet
      tags: [Pets]
      summary: Archive a pet record with audit reason
      description: PawIt never hard-deletes clinical records from the application API.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchivePetRequest"
      responses:
        "200":
          description: Pet archived
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/pets/{id}/documents:
    get:
      operationId: listPetDocuments
      tags: [Pets]
      summary: List active document metadata for a pet
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Pet document metadata
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetDocumentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: uploadPetDocument
      tags: [Pets]
      summary: Register uploaded pet document metadata
      description: >
        The file itself is stored through a signed upload flow. This endpoint
        records the document metadata once storage has accepted the object.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadPetDocumentRequest"
      responses:
        "201":
          description: Document metadata registered
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetDocumentMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/pets/{id}/documents/{documentId}/archive:
    post:
      operationId: archivePetDocument
      tags: [Pets]
      summary: Archive pet document metadata with an audit reason
      description: Document objects stay in storage; this marks metadata inactive in tenant scope.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/DocumentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchivePetDocumentRequest"
      responses:
        "200":
          description: Document metadata archived
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetDocumentMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/patients:
    get:
      operationId: listPatients
      tags: [Pets]
      summary: List pet records
      description: Legacy alias for `/pets` while the hospital UI migrates to veterinary naming.
      responses:
        "200":
          description: Pet records
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetRecordList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/prescriptions:
    get:
      operationId: listPrescriptions
      tags: [Clinical]
      summary: List tenant prescriptions
      description: Pet-parent callers with only shared-record permissions receive only prescriptions shared with them for pets where they are active guardians with record-view access.
      responses:
        "200":
          description: Prescription drafts and finalized prescriptions
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createPrescription
      tags: [Clinical]
      summary: Create a prescription draft with medication lines
      description: Veterinarians and vet technicians can create drafts; finalization is a separate veterinarian-only step.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrescriptionRequest"
      responses:
        "201":
          description: Prescription draft created
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/prescriptions/{id}/finalize:
    post:
      operationId: finalizePrescription
      tags: [Clinical]
      summary: Finalize a prescription draft
      description: Finalized prescriptions may optionally be shared with the pet parent.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/PathID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizePrescriptionRequest"
      responses:
        "200":
          description: Prescription finalized
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/prescription-templates:
    get:
      operationId: listPrescriptionTemplates
      tags: [Clinical]
      summary: List veterinary prescription templates
      responses:
        "200":
          description: Prescription templates
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionTemplateList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/v1/clinical-notes:
    get:
      operationId: listClinicalNotes
      tags: [Clinical]
      summary: List clinical notes and consultations
      description: Pet-parent callers with only shared-record permissions receive only clinical notes shared with them for pets where they are active guardians with record-view access.
      responses:
        "200":
          description: Clinical notes
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalNoteList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createClinicalNote
      tags: [Clinical]
      summary: Create a draft SOAP/clinical note
      description: Veterinarians and vet technicians can create draft clinical notes. Finalization remains a separate veterinarian workflow.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClinicalNoteRequest"
      responses:
        "201":
          description: Clinical note draft created
          headers:
            X-Request-ID:
              description: Request correlation identifier for support and tracing.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalNoteMutationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
