components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: pawit_access
      description: HttpOnly Secure SameSite=Strict JWT cookie signed with HS256.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT signed with HS256 using the configured PawIt signing key.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
      description: Safe retry key for mutation requests.
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier.
    DocumentID:
      name: documentId
      in: path
      required: true
      schema:
        type: string
      description: Pet document identifier.
  requestBodies:
    UpdateQueueBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UpdateQueueRequest"
  responses:
    BadRequest:
      description: Invalid request
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Role does not have required permission
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found in tenant scope
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: State conflict or idempotency-key conflict
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Request rate limit exceeded
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
        Retry-After:
          description: Seconds to wait before retrying the request.
          schema:
            type: string
            pattern: "^[0-9]+$"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service dependency unavailable
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    QueueMutationOK:
      description: Queue entry updated
      headers:
        X-Request-ID:
          description: Request correlation identifier for support and tracing.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QueueMutationResult"
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: pawit-vetcare-api
    ReadyResponse:
      type: object
      required: [status, checkedAt]
      properties:
        status:
          type: string
          const: ready
        checkedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    MeResponse:
      type: object
      required: [user, clinic]
      properties:
        user:
          type: object
          required: [id, role, tenantId]
          properties:
            id:
              type: string
            role:
              $ref: "#/components/schemas/Role"
            tenantId:
              type: string
        clinic:
          type: object
          required: [name, type]
          properties:
            name:
              type: string
            type:
              type: string
    ProductSpec:
      type: object
      required:
        - productName
        - shortName
        - supportedSpecies
        - supportedAppointmentTypes
        - supportedAppointmentStatuses
        - supportedLabStatuses
        - paymentProvider
        - currency
        - petParentAuth
        - telemedicine
        - labs
        - cancellationPolicy
        - recordDeletionPolicy
        - aiAdvisoryEnabled
        - groomingEnabled
        - hipaaAligned
      properties:
        productName:
          type: string
          const: PawIt VetCare
        shortName:
          type: string
          const: PawIt
        supportedSpecies:
          type: array
          items:
            $ref: "#/components/schemas/Species"
        supportedAppointmentTypes:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentType"
        supportedAppointmentStatuses:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentStatus"
        supportedLabStatuses:
          type: array
          items:
            $ref: "#/components/schemas/LabOrderStatus"
        paymentProvider:
          type: string
          const: stripe
        currency:
          type: string
          const: USD
        petParentAuth:
          type: string
          const: email_password
        telemedicine:
          $ref: "#/components/schemas/TelemedicineSpec"
        labs:
          $ref: "#/components/schemas/LabSpec"
        cancellationPolicy:
          $ref: "#/components/schemas/CancellationPolicy"
        recordDeletionPolicy:
          type: string
          const: archive_cancel_void_only
        aiAdvisoryEnabled:
          type: boolean
          const: false
        groomingEnabled:
          type: boolean
          const: false
        hipaaAligned:
          type: boolean
          const: true
    TelemedicineSpec:
      type: object
      required: [mode, builtInVideoRoomsEnabled]
      properties:
        mode:
          type: string
          const: manual_meeting_link
        builtInVideoRoomsEnabled:
          type: boolean
          const: false
    LabSpec:
      type: object
      required: [internalLabsEnabled, externalLabsEnabled, externalIntegrationMode, thirdPartyApiIntegrationInV1]
      properties:
        internalLabsEnabled:
          type: boolean
          const: true
        externalLabsEnabled:
          type: boolean
          const: true
        externalIntegrationMode:
          type: string
          const: manual_status_based
        thirdPartyApiIntegrationInV1:
          type: boolean
          const: false
    CancellationPolicy:
      type: object
      required: [defaultCutoffHours, tenantConfigurable, locationOverride, staffOverrideAllowed]
      properties:
        defaultCutoffHours:
          type: integer
          const: 24
        tenantConfigurable:
          type: boolean
          const: true
        locationOverride:
          type: boolean
          const: true
        staffOverrideAllowed:
          type: boolean
          const: true
    RolePolicyList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RolePolicy"
    RolePolicy:
      type: object
      required: [role, description, permissions]
      properties:
        role:
          $ref: "#/components/schemas/Role"
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        restrictions:
          type: array
          items:
            type: string
    NavigationResponse:
      type: object
      required: [sections]
      properties:
        sections:
          type: array
          items:
            $ref: "#/components/schemas/NavSection"
    NavSection:
      type: object
      required: [label, items]
      properties:
        label:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/NavItem"
    NavItem:
      type: object
      required: [label, path, icon]
      properties:
        label:
          type: string
        path:
          type: string
        icon:
          type: string
    MetricList:
      type: object
      required: [metrics]
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/Metric"
    Metric:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string
        delta:
          type: string
        tone:
          type: string
    AppointmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
    Appointment:
      type: object
      required: [id, petName, ownerName, primaryVeterinarian, additionalVeterinarians, time, type, status, contact, reason]
      properties:
        id:
          type: string
        petName:
          type: string
        ownerName:
          type: string
        primaryVeterinarian:
          type: string
        additionalVeterinarians:
          type: array
          items:
            type: string
        time:
          type: string
        type:
          $ref: "#/components/schemas/AppointmentType"
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        contact:
          type: string
        meetingUrl:
          type: string
        reason:
          type: string
    CreateAppointmentRequest:
      type: object
      required: [locationId, petId, type, reason]
      properties:
        locationId:
          type: string
        petId:
          type: string
        type:
          $ref: "#/components/schemas/AppointmentType"
        reason:
          type: string
          minLength: 1
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        primaryVeterinarianId:
          type: string
        additionalVeterinarianIds:
          type: array
          items:
            type: string
        meetingUrl:
          type: string
        requestedByPetParent:
          type: boolean
    CancelAppointmentRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
        staffOverride:
          type: boolean
    AppointmentMutationResult:
      type: object
      required: [appointment]
      properties:
        appointment:
          $ref: "#/components/schemas/Appointment"
        idempotent:
          type: boolean
    CalendarResponse:
      type: object
      required: [date, statusCounts, items]
      properties:
        date:
          type: string
          format: date
        statusCounts:
          type: object
          additionalProperties:
            type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
    QueueEntryList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QueueEntry"
    QueueEntry:
      type: object
      required: [id, petName, ownerName, species, priority, status, waitMins]
      properties:
        id:
          type: string
        petName:
          type: string
        ownerName:
          type: string
        species:
          $ref: "#/components/schemas/Species"
        priority:
          type: string
        status:
          $ref: "#/components/schemas/QueueStatus"
        waitMins:
          type: integer
    RegisterWalkInRequest:
      type: object
      required: [locationId, petId, reason]
      properties:
        locationId:
          type: string
        petId:
          type: string
        priority:
          type: string
        reason:
          type: string
          minLength: 1
    UpdateQueueRequest:
      type: object
      properties:
        reason:
          type: string
    QueueMutationResult:
      type: object
      required: [queueEntry]
      properties:
        queueEntry:
          $ref: "#/components/schemas/QueueEntry"
        idempotent:
          type: boolean
    PetRecordList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PetRecord"
    PetRecord:
      type: object
      required: [id, petName, ownerName, species, breed, age, sex, phone, lastVisit, vaccinesDue, openPlans, guardianCount, documentsCount]
      properties:
        id:
          type: string
        petName:
          type: string
        ownerName:
          type: string
        species:
          $ref: "#/components/schemas/Species"
        breed:
          type: string
        age:
          type: string
        sex:
          type: string
        phone:
          type: string
        lastVisit:
          type: string
        vaccinesDue:
          type: integer
        openPlans:
          type: integer
        guardianCount:
          type: integer
        documentsCount:
          type: integer
    CreatePetRequest:
      type: object
      required: [locationId, name, species, guardianName]
      properties:
        locationId:
          type: string
        name:
          type: string
          minLength: 1
        species:
          $ref: "#/components/schemas/Species"
        breed:
          type: string
